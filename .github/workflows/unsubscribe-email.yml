name: Unsubscribe Email

on:
  repository_dispatch:
    types: [unsubscribe_email]

jobs:
  unsubscribe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Remove email from list
        run: |
          EMAIL="${{ github.event.client_payload.email }}"
          FILE="subscribers.json"

          if [ ! -f "$FILE" ]; then
            echo "[]" > $FILE
          fi

          jq --arg email "$EMAIL" 'del(.[] | select(. == $email))' $FILE > tmp.json && mv tmp.json $FILE

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add subscribers.json
          git commit -m "unsubscribe email" || echo "No changes"
          git push